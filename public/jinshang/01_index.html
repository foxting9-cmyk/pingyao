<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>平遥古城 · 晋商文化总览</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            /* 青灰暮霭 · 配色板 */
            qing: {
              mist: "#F4F6F0",
              light: "#B7C8D0",
              mid: "#A2B9C4",
              deep: "#8699AD",
              accent: "#9BADB9",
            },
            rice: "#F4F6F0",
            ink: "#373737",
            clay: "#8699AD",
            mist: "#B7C8D0",
          },
          fontFamily: {
            serifcn: [
              "STSong",
              "SimSun",
              "Songti SC",
              "Noto Serif SC",
              "serif",
            ],
          },
          animation: {
            "float-slow": "floatY 8s ease-in-out infinite",
            "breathe": "breathe 5s ease-in-out infinite",
            "gradient-shift": "gradientShift 14s ease infinite",
          },
          keyframes: {
            floatY: {
              "0%, 100%": { transform: "translateY(0)" },
              "50%": { transform: "translateY(-10px)" },
            },
            breathe: {
              "0%, 100%": { opacity: "0.55" },
              "50%": { opacity: "0.95" },
            },
            gradientShift: {
              "0%, 100%": { backgroundPosition: "0% 50%" },
              "50%": { backgroundPosition: "100% 50%" },
            },
          },
        },
      }
    };
  </script>
  <style>
    html {
      scroll-behavior: smooth;
    }
    /* 清透化：弱化"框框感" */
    [class*="border-qing-light/"],
    [class*="border-qing-mid/"] {
      border-width: 0 !important;
    }

    /* 涟漪按钮效果 */
    .ripple {
      position: relative;
      overflow: hidden;
    }
    .ripple::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(
        circle at center,
        rgba(255,255,255,0.45),
        transparent 55%
      );
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .ripple:active::after {
      opacity: 1;
      transform: scale(2.5);
      transition: 0s;
    }

    @keyframes floatY {
      0%,
      100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 滚动进入视差：背景微动 */
    .hero-blob {
      animation: floatY 10s ease-in-out infinite;
    }
    .hero-blob-delay {
      animation: floatY 12s ease-in-out infinite;
      animation-delay: -3s;
    }

    /* 区块渐入 */
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* 卡片动效 */
    .catalog-card {
      transition: transform 0.35s ease, box-shadow 0.35s ease,
        border-color 0.25s ease;
    }
    .catalog-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 40px rgba(134, 153, 173, 0.28);
    }

    .scroll-hero-wrapper {
      position: relative;
      height: 360vh; /* 长滚动段 */
    }
    .scroll-hero-fixed {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }
    .scroll-layer {
      will-change: transform, opacity;
      transition: transform 0.1s linear, opacity 0.2s linear;
    }

    /* iframe 基础样式 */
    .final-iframe {
      width: 100%;
      border: none;
      overflow: hidden;
    }
    .iframe-500 { min-height: 500px; }
    .iframe-600 { min-height: 600px; }
    .iframe-700 { min-height: 700px; }
    .iframe-800 { min-height: 800px; }
    .iframe-900 { min-height: 900px; }
    .iframe-1500 { min-height: 1500px; }

    .final-iframe::-webkit-scrollbar { display: none; }
    .final-iframe + .final-iframe { margin-top: 40px; }

    /* 票号区图片位置微调：取消上移，避免首屏内容偏移 */
    #piaohao .final-iframe:first-of-type { margin-top: 0; }
    #piaohao .final-iframe + .final-iframe { margin-top: 24px; }

    /* 隐藏主页面滚动条 */
    body::-webkit-scrollbar { display: none; }
    body {
      -ms-overflow-style: none;
      scrollbar-width: none;
      overflow-x: hidden;
    }

    .float-card {
      transition: transform 0.35s ease;
    }
    .float-card:hover {
      transform: translateY(-10px);
    }

    @keyframes fadeSlideDown {
      0% { opacity: 0; transform: translateY(-30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-slide-down {
      animation: fadeSlideDown 1s ease forwards;
    }

    .section-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-blob, .hero-blob-delay { animation: none !important; }
      .animate-breathe { animation: none !important; }
      .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
    }

    /* 副标题 + 导航字体 */
    @font-face {
      font-family: 'XuanZongTi';
      src: url('./fonts/jinshang_culture/XuanZongTi.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    .title-font {
      font-family: 'XuanZongTi', serif !important;
    }

    /* 主标题字体 */
    @font-face {
      font-family: 'BangBangTi';
      src: url('./fonts/jinshang_culture/FeiYangTi.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    .main-title-font {
      font-family: 'BangBangTi', serif !important;
    }

    /* 内容区二级标题字体：禹卫书法云墨繁体 */
    @font-face {
      font-family: 'YuWeiYunMo';
      src: url('./fonts/jinshang_culture/BangBangTi.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    .section-title-font {
      font-family: 'YuWeiYunMo', serif !important;
    }

  </style>
</head>

<body

    <!-- 标题过渡区 -->

      <div class="mx-auto max-w-4xl px-4 sm:px-6 lg:px-8 text-center">

<!-- 内容区 -->
<div class="pb-24">
  <section id="overview" class="py-16 scroll-mt-10 reveal">
    <div class="section-container">

</div>

  <script>
    (function () {
      var wrapper = document.getElementById("scroll-hero-wrapper");
      var fixed = document.getElementById("scroll-hero-fixed");
      var bgLayer = document.querySelector('[data-layer="bg"]');
      var midLayer = document.querySelector('[data-layer="mid"]');
      var mainLayer = document.querySelector('[data-layer="main"]');
      var fgLayer = document.querySelector('[data-layer="fg"]');
      var titleLayer = document.querySelector('[data-layer="title"]');
      var subtitleLayer = document.querySelector('[data-layer="subtitle"]');

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

      function updateParallax() {
        if (!wrapper || !fixed) return;
        var rect = wrapper.getBoundingClientRect();
        var vh = window.innerHeight || document.documentElement.clientHeight;
        var total = rect.height - vh;
        if (total <= 0) { fixed.style.opacity = "1"; return; }
        var progress = clamp(-rect.top / total, 0, 1);
        if (rect.bottom <= 0 || rect.top >= vh) { fixed.style.opacity = "0"; return; }
        else { fixed.style.opacity = "1"; }
        var t = progress; var easeT = t * t;
        if (bgLayer) { var bgY = easeT * 20; var bgScale = 0.96 + easeT * 0.06; bgLayer.style.transform = "translate3d(0,"+bgY+"px,0) scale("+bgScale+")"; }
        if (midLayer) { var midY = t * 40; midLayer.style.transform = "translate3d(0,"+midY+"px,0) scale(1.02)"; }
        if (mainLayer) { var mainY = t * 60; var mainScale = 0.94 + t * 0.08; mainLayer.style.transform = "translate3d(0,"+mainY+"px,0) scale("+mainScale+")"; }
        if (fgLayer) { var fgY = t * 80; fgLayer.style.transform = "translate3d(0,"+fgY+"px,0)"; }
        if (titleLayer) { var titleY = t * 20; titleLayer.style.transform = "translate3d(0,"+titleY+"px,0)"; titleLayer.style.opacity = String(Math.min(1, t * 1.5)); }
        if (subtitleLayer) { var subtitleY = t * 35; subtitleLayer.style.transform = "translate3d(0,"+subtitleY+"px,0)"; subtitleLayer.style.opacity = String(Math.min(1, t * 2)); }
      }

      window.addEventListener("scroll", updateParallax, { passive: true });
      window.addEventListener("resize", updateParallax);

      /* 正文区块：滚动进入时渐入 */
      (function () {
        if (!window.IntersectionObserver) {
          document.querySelectorAll(".reveal").forEach(el => { el.classList.add("is-visible"); });
          return;
        }
        var io = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              io.unobserve(entry.target);
            }
          });
        }, { root: null, rootMargin: "0px 0px -8% 0px", threshold: 0.08 });
        document.querySelectorAll(".reveal").forEach(el => { io.observe(el); });
      })();

      window.addEventListener("load", function () { updateParallax(); });
    })();

    // 更稳健的 iframe 高度自适应：容错并重试，避免跨域或加载顺序导致的异常
    function resizeIframe(iframe) {
      const MAX_TRIES = 6;
      const RETRY_DELAY = 300;
      let tries = parseInt(iframe.dataset.resizeTries || "0", 10);

      const attempt = () => {
        try {
          const doc = iframe.contentWindow.document;
          const height = Math.max(
            doc.body.scrollHeight,
            doc.body.offsetHeight,
            doc.documentElement.scrollHeight,
            doc.documentElement.offsetHeight
          );
          iframe.style.height = height + 80 + "px";
          iframe.dataset.resizeTries = "0";
        } catch (err) {
          tries += 1;
          iframe.dataset.resizeTries = String(tries);
          if (tries < MAX_TRIES) {
            setTimeout(attempt, RETRY_DELAY);
          } else {
            console.warn("resizeIframe: failed after retries", iframe.src, err);
          }
        }
      };

      setTimeout(attempt, 200);
    }

    window.addEventListener("load", () => {
      document.querySelectorAll(".final-iframe").forEach(f => resizeIframe(f));
    });
  </script>
